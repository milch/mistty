<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A0E1A"/>
      <stop offset="1" stop-color="#1A2238"/>
    </linearGradient>

    <linearGradient id="ghostFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#DCEAFF"/>
      <stop offset="1" stop-color="#7FA3D4"/>
    </linearGradient>

    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5A8FD8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5A8FD8" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <pattern id="scanlines" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="1" fill="#e0def4" opacity="0.09"/>
    </pattern>

    <clipPath id="squircle">
      <path d="M 0 224 C 0 64 64 0 224 0 L 800 0 C 960 0 1024 64 1024 224 L 1024 800 C 1024 960 960 1024 800 1024 L 224 1024 C 64 1024 0 960 0 800 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- Terminal screen background -->
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- CRT scanlines -->
    <rect width="1024" height="1024" fill="url(#scanlines)"/>

    <!-- Terminal prompt + cursor (rose-pine palette) -->
    <g font-family="Menlo, 'SF Mono', monospace" font-size="200" font-weight="500">
      <text x="112" y="928" fill="#9ccfd8">~</text>
      <text x="252" y="928" fill="#c4a7e7">❯</text>
      <rect x="408" y="788" width="88" height="148" fill="#e0def4"/>
    </g>

    <!-- Ghost + halo + eyes + dissolve, shifted up-right -->
    <g transform="translate(48 -120)">

    <!-- Soft halo behind ghost -->
    <ellipse cx="512" cy="500" rx="360" ry="320" fill="url(#halo)"/>

    <!-- Ghost: smooth top dome + 3 bottom bumps -->
    <path fill="url(#ghostFill)" filter="url(#softGlow)" d="
      M 272 540
      A 240 240 0 0 1 752 540
      L 752 700
      A 80 80 0 0 1 592 700
      A 80 80 0 0 1 432 700
      A 80 80 0 0 1 272 700
      Z"/>

    <!-- Eyes: cutouts revealing terminal bg -->
    <g fill="#0B0F1C">
      <rect x="408" y="450" width="56" height="120" rx="22"/>
      <rect x="560" y="450" width="56" height="120" rx="22"/>
    </g>
    <!-- Eye highlights -->
    <g fill="#FFFFFF" opacity="0.9">
      <rect x="436" y="464" width="20" height="40" rx="6"/>
      <rect x="588" y="464" width="20" height="40" rx="6"/>
    </g>

    <!-- Digital mist: pixels detaching from ghost -->
    <g fill="url(#ghostFill)">
      <!-- Top crown floaters -->
      <rect x="488" y="232" width="32" height="32" opacity="0.85"/>
      <rect x="396" y="276" width="28" height="28" opacity="0.75"/>
      <rect x="612" y="270" width="28" height="28" opacity="0.78"/>
      <rect x="540" y="184" width="24" height="24" opacity="0.55"/>
      <rect x="436" y="200" width="20" height="20" opacity="0.45"/>
      <rect x="640" y="204" width="20" height="20" opacity="0.5"/>
      <rect x="372" y="148" width="16" height="16" opacity="0.32"/>
      <rect x="700" y="152" width="16" height="16" opacity="0.35"/>
      <rect x="500" y="120" width="14" height="14" opacity="0.28"/>

      <!-- Left side floaters -->
      <rect x="208" y="492" width="32" height="32" opacity="0.7"/>
      <rect x="168" y="556" width="24" height="24" opacity="0.5"/>
      <rect x="132" y="620" width="20" height="20" opacity="0.36"/>
      <rect x="240" y="612" width="16" height="16" opacity="0.42"/>
      <rect x="100" y="568" width="14" height="14" opacity="0.25"/>

      <!-- Right side floaters -->
      <rect x="784" y="488" width="32" height="32" opacity="0.72"/>
      <rect x="836" y="548" width="24" height="24" opacity="0.5"/>
      <rect x="876" y="612" width="20" height="20" opacity="0.36"/>
      <rect x="772" y="608" width="16" height="16" opacity="0.42"/>
      <rect x="908" y="556" width="14" height="14" opacity="0.25"/>

      <!-- Bottom dissolve - falling pixels under arcs -->
      <rect x="332" y="800" width="28" height="28" opacity="0.7"/>
      <rect x="492" y="804" width="32" height="32" opacity="0.78"/>
      <rect x="648" y="800" width="28" height="28" opacity="0.7"/>
      <rect x="412" y="836" width="20" height="20" opacity="0.5"/>
      <rect x="572" y="836" width="20" height="20" opacity="0.5"/>
      <rect x="368" y="876" width="16" height="16" opacity="0.35"/>
      <rect x="528" y="880" width="16" height="16" opacity="0.35"/>
      <rect x="688" y="876" width="16" height="16" opacity="0.35"/>
      <rect x="448" y="908" width="12" height="12" opacity="0.25"/>
      <rect x="608" y="912" width="12" height="12" opacity="0.25"/>
    </g>

    </g> <!-- end ghost shift -->

    <!-- Monitor bezel: inner squircle stroke -->
    <path d="M 32 240 C 32 84 84 32 240 32 L 784 32 C 940 32 992 84 992 240 L 992 784 C 992 940 940 992 784 992 L 240 992 C 84 992 32 940 32 784 Z"
          fill="none" stroke="#6e6a86" stroke-width="28" opacity="0.9"/>
    <!-- Subtle top-edge highlight (screen specular) -->
    <path d="M 240 32 L 784 32 C 940 32 992 84 992 240"
          fill="none" stroke="#e0def4" stroke-width="10" opacity="0.4"/>
  </g>
</svg>
