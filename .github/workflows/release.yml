name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Verify tools
        run: |
          nix develop --command zig version
          swift --version
          just --version

      - name: Cache Zig build
        uses: actions/cache@v4
        with:
          path: |
            vendor/ghostty/zig-out
            vendor/ghostty/.zig-cache
            ~/.cache/zig
          key: zig-${{ runner.os }}-${{ hashFiles('vendor/ghostty/build.zig', 'vendor/ghostty/build.zig.zon') }}
          restore-keys: |
            zig-${{ runner.os }}-

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build + bundle .app
        run: just bundle-release

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Zip .app
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent Mistty.app "Mistty-${{ steps.tag.outputs.name }}-arm64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: false
          generate_release_notes: true
          files: build/Mistty-${{ steps.tag.outputs.name }}-arm64.zip

      - name: Update Homebrew tap
        env:
          TAG: ${{ steps.tag.outputs.name }}
          DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          ZIP="build/Mistty-${TAG}-arm64.zip"
          SHA256=$(shasum -a 256 "$ZIP" | awk '{print $1}')

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/tap_deploy
          chmod 600 ~/.ssh/tap_deploy
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_deploy -o IdentitiesOnly=yes"

          TAP=$(mktemp -d)/homebrew-mistty
          git clone git@github.com:milch/homebrew-mistty.git "$TAP"
          cd "$TAP"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          CASK=Casks/mistty.rb
          sed -i.bak -E \
            -e "s|^([[:space:]]*version[[:space:]]+)\"[^\"]*\"|\\1\"${VERSION}\"|" \
            -e "s|^([[:space:]]*sha256[[:space:]]+)\"[^\"]*\"|\\1\"${SHA256}\"|" \
            "$CASK"
          rm -f "${CASK}.bak"

          if git diff --quiet; then
            echo "Cask already up to date; nothing to push."
            exit 0
          fi
          git add "$CASK"
          git commit -m "Update mistty to ${TAG}"
          git push origin HEAD:main

          rm -f ~/.ssh/tap_deploy
