# Mistty configuration — sample file with all defaults.
#
# Copy to ~/.config/mistty/config.toml and edit to taste.
# Values shown are the built-in defaults; remove a key to revert.
#
# To inspect what Mistty actually passes through to ghostty, run
# `mistty-cli config show` or watch stdout when launching Mistty from a
# terminal.

# Terminal font size in points. Forwarded to ghostty as `font-size`.
font_size = 13

# Font family. Any monospace font installed on the system works.
# Examples: "JetBrainsMono Nerd Font", "SF Mono", "Menlo".
# Forwarded to ghostty as `font-family` when set. Leave unset (or comment
# out) to let ghostty / your ghostty.conf pick — setting this to an empty
# string would clear ghostty's font list entirely, so we skip the forward.
# font_family = "JetBrainsMono Nerd Font"

# Cursor shape. Forwarded to ghostty as `cursor-style`.
# Options: "block" | "bar" (beam) | "underline"
cursor_style = "block"

# Scrollback buffer size, in lines. Forwarded to ghostty as
# `scrollback-limit = lines * 1000` bytes, matching ghostty's own default
# of 10 000 000 bytes (~10 000 lines).
scrollback_lines = 10000

# Show the session sidebar on launch.
# Toggle at runtime with cmd+\.
sidebar_visible = true

# Absolute path to the `zoxide` binary. Optional.
# When unset, Mistty probes common install locations (Homebrew ARM/Intel,
# nix-darwin, home-manager, nix single-user, ~/.cargo/bin, ~/.local/bin),
# then falls back to spawning a login shell to resolve the path. Set this
# to skip the probe — useful if zoxide lives somewhere exotic, or to avoid
# the `bash -lc` fallback on every cold start. Leading ~ is expanded.
# zoxide_path = "~/.cargo/bin/zoxide"

# ─── Popup windows ───────────────────────────────────────────────────────────
# Transient, floating terminal windows bound to a keyboard shortcut.
# Add one [[popup]] block per popup. No defaults ship.
#
# [[popup]]
# name = "scratch"                  # display name
# command = "zsh"                   # command to run
# shortcut = "cmd+shift+space"      # modifiers: cmd/command, shift, opt/option/alt, ctrl/control
# width = 0.8                       # fraction of screen width  (0.1–1.0)
# height = 0.8                      # fraction of screen height (0.1–1.0)
# close_on_exit = true              # close popup when command exits

# ─── SSH ─────────────────────────────────────────────────────────────────────
# Command used when opening SSH sessions from the session manager.
[ssh]
# Default command. Host is appended as the final argument.
default_command = "ssh"

# Per-host overrides. Match by exact hostname or regex; first match wins.
#
# [[ssh.host]]
# hostname = "prod.example.com"
# command = "ssh -J bastion.example.com"
#
# [[ssh.host]]
# regex = "^.*\\.staging\\.example\\.com$"
# command = "ssh -o StrictHostKeyChecking=no"

# ─── Copy mode hints ─────────────────────────────────────────────────────────
[copy_mode.hints]
# Letters used to label hints. Order matters — earlier letters are assigned first.
# Pick keys that are easy to reach on your layout.
alphabet = "asdfghjkl"

# Action triggered by uppercase hint letters. Lowercase triggers the other.
# Options: "open" | "copy"
#   "open" → uppercase opens URL/file, lowercase copies to clipboard
#   "copy" → uppercase copies, lowercase opens
uppercase_action = "open"

# ─── Window chrome ───────────────────────────────────────────────────────────
[ui]
# When to show the tab bar.
# Options:
#   "always"                                — tab bar always visible
#   "never"                                 — tab bar never visible
#   "when_sidebar_hidden"                   — only when the sidebar is collapsed
#   "when_sidebar_hidden_and_multiple_tabs" — sidebar collapsed AND more than one tab
#   "when_multiple_tabs"                    — whenever there is more than one tab (default)
tab_bar_mode = "when_multiple_tabs"

# Title bar appearance.
# Options:
#   "always"             — standard macOS title bar above content
#   "hidden_with_lights" — title bar hidden, traffic lights float over content (default)
#   "hidden_no_lights"   — title bar hidden, no traffic lights (use cmd+w / cmd+q to close)
title_bar_style = "hidden_with_lights"

# Padding, in points, inside the terminal surface. The area fills with the
# terminal background, so this adds breathing room without cutting into the
# text. Accepts an integer (symmetric) or a 2-element array (start, end).
#   content_padding_x = 4        # 4pt left + 4pt right
#   content_padding_x = [4, 8]   # 4pt left, 8pt right
#   content_padding_y = [9, 0]   # 9pt top, 0pt bottom
# Maps directly to ghostty's window-padding-x / window-padding-y.
# content_padding_x = 4
# content_padding_y = [9, 0]

# When true, ghostty distributes leftover pixels as extra padding so the grid
# stays centered within the surface. Maps to ghostty window-padding-balance.
# content_padding_balance = true

# Border between split panes. Accepts "#rrggbb" or "#rrggbbaa" (with or
# without the leading #). When omitted, the system separator color is used
# — this blends into the chrome and usually looks right.
# pane_border_color = "#3a3a3a"

# Border thickness in points. Default 1.
# pane_border_width = 1

# ─── Ghostty passthrough ─────────────────────────────────────────────────────
# Any ghostty config key placed under [ghostty] is forwarded verbatim to
# libghostty. Keys use ghostty's kebab-case names exactly as they appear in
# `ghostty +show-config` / the ghostty docs.
#
# This is the same as dropping options into ~/.config/mistty/ghostty.conf —
# use whichever you prefer. Mistty-managed keys (see below) are always
# ignored here, and Mistty's own [ui] keys (content_padding_*,
# pane_border_*) take precedence.
#
# Keys that Mistty MANAGES and will IGNORE in this table:
#   window-* (width/height/position/decoration/save-state/title/theme/…),
#   split-divider-color, split-preserve-zoom, split-inherit-working-directory,
#   tab-inherit-working-directory, keybind, key-remap, command,
#   initial-command, working-directory, quick-terminal-*, macos-titlebar-style,
#   macos-window-buttons, macos-window-shadow, macos-icon*,
#   macos-non-native-fullscreen, macos-applescript, macos-shortcuts,
#   macos-dock-drop-behavior, macos-hidden, background-opacity,
#   background-blur, config-file, auto-update*,
#   quit-after-last-window-closed*, undo-timeout, command-palette-entry,
#   focus-follows-mouse, maximize, fullscreen, title.
# Configure those through Mistty's own options (e.g. ui.title_bar_style,
# ui.content_padding_*, ui.pane_border_*) instead.
[ghostty]
# ── Theme / colors ──
# Named theme ships with ghostty — run `ghostty +list-themes` to browse.
# `theme` is emitted first so your own overrides win.
# theme = "Dracula"
# background = "#1e1e2e"
# foreground = "#cdd6f4"
# cursor-color = "#f5e0dc"
# selection-background = "#585b70"
# palette = ["0=#45475a", "1=#f38ba8"]   # repeatable — use TOML array
# Note: alphabetical ordering means custom `palette` entries would be
# emitted BEFORE `palette-generate`, so don't combine the two.

# ── Font rendering ──
# Override Mistty's top-level font_* keys by editing THOSE (they map to
# font-family / font-size). Use these for advanced font control.
# font-family-bold = "JetBrainsMono Nerd Font Bold"
# font-family-italic = "Monaspace Radon Var"
# font-feature = ["-calt", "-liga"]      # disable ligatures
# font-variation = ["wght=450"]
# font-thicken = true                    # macOS: thicker strokes

# ── Display / rendering ──
# Display-P3 wide-gamut rendering on supported screens.
# window-colorspace = "display-p3"
# alpha-blending = "linear-corrected"
# minimum-contrast = 1.1
# window-vsync = true

# ── Transparency / blur (macOS) ──
# Mistty's NSWindow is fully opaque today — `background-opacity`,
# `background-opacity-cells` and `background-blur` are DENIED and will be
# ignored with a diagnostic. Once Mistty wires the window layer, these will
# become supported.

# ── Cursor ──
# cursor-style-blink = true
# cursor-opacity = 0.9
# cursor-click-to-move = true

# ── Mouse ──
# mouse-hide-while-typing = true
# mouse-scroll-multiplier = 1.0

# ── Selection / clipboard ──
# copy-on-select = "clipboard"
# selection-clear-on-typing = true
# clipboard-paste-protection = true
# clipboard-read = "ask"
# clipboard-write = "allow"

# ── Shell integration ──
# shell-integration = "detect"
# shell-integration-features = "cursor,sudo,title"
# env = ["FOO=bar", "BAZ=qux"]

# ── Bell / notifications ──
# bell-features = "audio,attention"
# bell-audio-volume = 0.5
# desktop-notifications = true
# notify-on-command-finish = "unfocused"

# ── Links ──
# link-url = true
# link-previews = "osc8"

# ── macOS input ──
# macos-option-as-alt = true             # or "left" / "right"
# macos-auto-secure-input = true

# ── Misc ──
# scrollbar = "never"
# term = "xterm-ghostty"
# confirm-close-surface = true
# osc-color-report-format = "16-bit"
# resize-overlay = "after-first"

# ── Custom shader ──
# Path or list of paths to GLSL shader files. Use ~ or absolute paths.
# custom-shader = "~/.config/ghostty/shaders/retro.glsl"
# custom-shader-animation = true
